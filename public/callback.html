<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Connecting Gmail...</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 50px; background: #f1f3f4; }
    h2 { color: #202124; }
  </style>
</head>
<body>
  <h2 id="status">Connecting your Gmail...</h2>

  <script>
    async function run() {
      try {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        if (!code) throw new Error("No code in URL");

        // Send code to backend API
        const res = await fetch("/api/auth/google", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code })
        });

        const text = await res.text();
        const data = text ? JSON.parse(text) : {};
        console.log("RAW RESPONSE:", data);

        if (data.error) throw new Error(data.error);

        document.getElementById("status").innerHTML =
          `✅ Connected: <b>${data.email}</b>`;

        // Redirect after 2 seconds
        setTimeout(() => window.location.href = "/success.html", 2000);
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText =
          `❌ Error: ${err.message}`;
      }
    }

    run();
  </script>
</body>
</html>
